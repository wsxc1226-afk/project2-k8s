# 1. 설정 보관함: 메일 서버 초기화 스크립트
apiVersion: v1
kind: ConfigMap
metadata:
  name: mail-server-config
data:
  setup.sh: |
    #!/bin/bash
    set -e
    export DEBIAN_FRONTEND=noninteractive

    echo "[1/4] 패키지 설치 시작 (Postfix, Dovecot)..."
    apt-get update && apt-get install -y postfix dovecot-pop3d net-tools

    echo "[2/4] 사용자 계정 생성 (alice, bob)..."
    id -u alice >/dev/null 2>&1 || useradd -m -s /bin/bash alice
    echo "alice:1234" | chpasswd
    id -u bob >/dev/null 2>&1 || useradd -m -s /bin/bash bob
    echo "bob:1234" | chpasswd

    echo "[3/4] 네트워크 및 보안 설정..."
    postconf -e "inet_interfaces = all"
    postconf -e "mynetworks = 0.0.0.0/0"
    postconf -e "myhostname = edgeA.lab"
    
    # Maildir 권한 및 디렉토리 강제 생성
    mkdir -p /var/mail && chmod 1777 /var/mail
    mkdir -p /var/log && touch /var/log/mail.log

    echo "[4/4] 서비스 강제 실행..."
    # 컨테이너 환경에 맞게 직접 바이너리 실행 혹은 서비스 시작
    service postfix start
    service dovecot start

    echo "=========================================="
    echo "   Edge A Mail Server is Ready (10.20.0.201) "
    echo "=========================================="
    
    # 로그 파일이 비어있어도 tail이 죽지 않도록 유지
    tail -f /var/log/mail.log

---
# 2. 실행 설계도: 메일 서버 배포 (Deployment)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mail-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mail
  template:
    metadata:
      labels:
        app: mail
    spec:
      containers:
      - name: mail-container
        image: ubuntu:22.04
        # 스크립트 복사 및 실행 (권한 문제 방지)
        command: ["/bin/bash", "-c", "cp /scripts/setup.sh /setup.sh && chmod +x /setup.sh && /setup.sh"]
        ports:
        - containerPort: 25
        - containerPort: 110
        volumeMounts:
        - name: scripts
          mountPath: /scripts
      volumes:
      - name: scripts
        configMap:
          name: mail-server-config
          defaultMode: 0755

---
# 3. 외부 노출: 서비스 (Service) - IP 10.20.0.201 고정 -> change!!
apiVersion: v1
kind: Service
metadata:
  name: mail-service
  annotations:
    # MetalLB를 통한 고정 IP 할당
    #metallb.universe.tf/loadBalancerIPs: 10.20.0.201
    metallb.universe.tf/loadBalancerIPs: 172.16.20.202
spec:
  type: LoadBalancer
  selector:
    app: mail
  ports:
    - name: smtp
      port: 25
      targetPort: 25
    - name: pop3
      port: 110
      targetPort: 110
