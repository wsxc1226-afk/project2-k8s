#metallb-config.yaml
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: test-pool
  namespace: metallb-system
spec:
  addresses:
#  - 10.20.0.100-10.20.0.255
  - 172.16.20.200-172.16.20.210
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: l2-broadcast
  namespace: metallb-system
spec:
  ipAddressPools:
  - test-pool
